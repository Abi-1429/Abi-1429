<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 250" width="1000" height="250">
  <defs>
    <!-- Main Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#1A1A3A" />
      <stop offset="100%" stop-color="#6C63FF" />
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Chart Gradient -->
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF6584" />
      <stop offset="100%" stop-color="#FFC857" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="250" fill="url(#bgGrad)" rx="16" />

  <!-- Grid Pattern (Subtle Data Vibe) -->
  <g opacity="0.05">
    <line x1="0" y1="50" x2="1000" y2="50" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="100" x2="1000" y2="100" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="150" x2="1000" y2="150" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="200" x2="1000" y2="200" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="250" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="250" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="250" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="250" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- ===== LEFT SIDE: DATA VISUALIZATIONS ===== -->
  <g transform="translate(60, 60)">
    <!-- Bar Chart -->
    <rect x="0" y="80" width="18" height="40" rx="4" fill="url(#barGrad)" opacity="0.9"/>
    <rect x="25" y="50" width="18" height="70" rx="4" fill="#00D4FF" opacity="0.9"/>
    <rect x="50" y="20" width="18" height="100" rx="4" fill="#FF6584" opacity="0.9"/>
    <rect x="75" y="60" width="18" height="60" rx="4" fill="#FFC857" opacity="0.9"/>
    <rect x="100" y="10" width="18" height="110" rx="4" fill="#6C63FF" opacity="0.9"/>
    
    <!-- Line Graph Dots & Connection -->
    <polyline points="10,90 35,60 60,30 85,70 110,20" fill="none" stroke="#FFFFFF" stroke-width="2.5" opacity="0.6"/>
    <circle cx="10" cy="90" r="5" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="35" cy="60" r="5" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="60" cy="30" r="5" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="85" cy="70" r="5" fill="#FFFFFF" filter="url(#glow)"/>
    <circle cx="110" cy="20" r="5" fill="#FFFFFF" filter="url(#glow)"/>
  </g>

  <!-- Network/Nodes Decoration -->
  <g transform="translate(30, 170)" opacity="0.4">
    <circle cx="0" cy="0" r="3" fill="#00D4FF"/>
    <circle cx="20" cy="-15" r="3" fill="#FFC857"/>
    <circle cx="40" cy="-5" r="3" fill="#FF6584"/>
    <line x1="0" y1="0" x2="20" y2="-15" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="20" y1="-15" x2="40" y2="-5" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="0" y1="0" x2="40" y2="-5" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- ===== RIGHT SIDE: PROFILE TEXT ===== -->
  
  <!-- Username -->
  <text x="220" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF" letter-spacing="2">
    Abi-1429
  </text>

  <!-- Decorative Underline -->
  <rect x="220" y="100" width="110" height="5" rx="3" fill="#FFC857" filter="url(#glow)"/>

  <!-- Main Tagline -->
  <text x="220" y="140" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#C8C8D4">
    📊 Data Analytics &amp; Business Intelligence
  </text>

  <!-- Tech Stack -->
  <text x="220" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#A8A8B8">
    <tspan fill="#FF6584">●</tspan> Power BI  <tspan fill="#00D4FF" dx="15">●</tspan> Python  <tspan fill="#FFC857" dx="15">●</tspan> Firebase  <tspan fill="#6C63FF" dx="15">●</tspan> HTML/CSS/JS
  </text>

  <!-- Brand Motto -->
  <text x="220" y="210" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#FFFFFF" opacity="0.7" font-style="italic">
    🚀 Turning raw data into meaningful insights
  </text>

  <!-- Floating Decorative Elements -->
  <circle cx="850" cy="40" r="6" fill="#FF6584" opacity="0.7" filter="url(#glow)"/>
  <circle cx="930" cy="80" r="4" fill="#00D4FF" opacity="0.6"/>
  <circle cx="890" cy="180" r="8" fill="#FFC857" opacity="0.4"/>
  <circle cx="960" cy="160" r="3" fill="#6C63FF" opacity="0.8"/>
  <circle cx="820" cy="200" r="5" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- Pie Chart Snippet (Bottom Right) -->
  <g transform="translate(850, 180)">
    <path d="M0,0 L20,-25 A30,30 0 0,1 30,10 Z" fill="#FF6584" opacity="0.6"/>
    <path d="M0,0 L30,10 A30,30 0 0,1 -10,28 Z" fill="#00D4FF" opacity="0.6"/>
    <circle cx="0" cy="0" r="8" fill="#1A1A3A"/>
  </g>

</svg>
